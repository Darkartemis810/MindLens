<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindLens – AI Student Wellbeing Analyzer</title>
  <meta name="description"
    content="AI-powered student wellbeing analyzer with journaling, emotion detection, and burnout prediction." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Google Fonts for V3: Luminous Cortex -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <meta name="author" content="MindLens" />
  <meta property="og:title" content="MindLens – AI Student Wellbeing Analyzer" />
  <meta property="og:description"
    content="Analyze your mental wellbeing with AI-powered journaling, facial emotion detection, and burnout prediction." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
</head>

<body>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;position:fixed;z-index:9999;inset:0"><h1>Global Error:</h1><p>' + msg + '</p><pre>' + (error ? error.stack : '') + '</pre></div>' + document.body.innerHTML;
    };
    window.addEventListener("unhandledrejection", function (event) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;position:fixed;z-index:9999;inset:0"><h1>Unhandled Promise Rejection:</h1><pre>' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</pre></div>' + document.body.innerHTML;
    });
    const oldError = console.error;
    console.error = function () {
      oldError.apply(console, arguments);
      let msg = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(" ");
      document.body.innerHTML = '<div style="background:orange;color:white;padding:20px;position:absolute;z-index:9998;inset:0"><h1>Console Error:</h1><pre>' + msg + '</pre></div>' + document.body.innerHTML;
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
